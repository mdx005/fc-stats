<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>FC Champion // 50 — Spectator View</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
  color-scheme: dark;
  --bg: #0A1128;
  --panel: #101a3a;
  --panel-2: #16224a;
  --line: #2A3B6B;
  --gold: #E8B94A;
  --gold-dim: #a9873b;
  --flag-red: #E14B3C;
  --flag-blue: #3E7CB1;
  --win: #4ADE80;
  --loss: #FF6B6B;
  --draw: #8291B8;
  --text: #F1F3FA;
  --text-muted: #7C89B0;
  --font-display: 'Teko', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at top, rgba(232,185,74,0.09) 0%, rgba(10,17,40,0) 45%),
    radial-gradient(circle at 12% 90%, rgba(62,124,177,0.12) 0%, rgba(10,17,40,0) 42%),
    repeating-radial-gradient(circle at 0 0, rgba(255,255,255,0.025) 0, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 46px);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  padding: 28px 16px 60px;
}

.shell { max-width: 640px; margin: 0 auto; }

.eyebrow-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--gold-dim);
  text-transform: uppercase;
}
.spectator-tag {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--flag-blue);
  border: 1px solid var(--flag-blue);
  border-radius: 4px;
  padding: 3px 7px;
}
h1 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 44px;
  letter-spacing: 0.01em;
  line-height: 1;
  margin: 0 0 4px;
  color: var(--text);
}
h1 span { color: var(--gold); }
.subtitle {
  color: var(--text-muted);
  font-size: 13.5px;
  margin: 0 0 16px;
}

.nameplate {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 7px 14px;
  margin-bottom: 20px;
}
.nameplate .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--flag-blue);
  box-shadow: 0 0 6px var(--flag-blue);
  flex-shrink: 0;
}
.nameplate .lbl {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  text-transform: uppercase;
}
.nameplate .name {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.03em;
  color: var(--gold);
  text-transform: uppercase;
}

.ovr-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 7px 14px;
  margin-bottom: 20px;
  margin-left: 8px;
}
.ovr-chip .lbl {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  text-transform: uppercase;
}
.ovr-chip .ovr-value {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--gold);
}

.milestone-toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: linear-gradient(135deg, var(--panel-2), var(--panel));
  border: 1px solid var(--gold);
  border-radius: 10px;
  padding: 12px 22px;
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.04em;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 24px rgba(232,185,74,0.3);
  opacity: 0;
  z-index: 1000;
  pointer-events: none;
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.milestone-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.hero-count.pulse-update { animation: countPulse 0.6s ease-in-out 2; }
@keyframes countPulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.15); text-shadow: 0 0 40px rgba(232,185,74,0.9); }
}

.records-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.record-tile {
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px 8px;
  text-align: center;
}
.record-lbl {
  font-family: var(--font-mono);
  font-size: 8.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.record-val {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  color: var(--gold);
  line-height: 1;
}
.record-sub {
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--text-muted);
  margin-top: 3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.notes-section {
  border-top: 1px solid var(--line);
  padding-top: 12px;
  margin-top: 4px;
}
.notes-lbl {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.note-entry {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 6px 0;
  border-bottom: 1px dashed var(--line);
}
.note-entry:last-child { border-bottom: none; }
.note-text {
  font-family: var(--font-body);
  font-size: 12.5px;
  color: var(--text);
  font-style: italic;
}
.note-context {
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--gold-dim);
}

.hero {
  position: relative;
  overflow: hidden;
  background: linear-gradient(180deg, var(--panel-2), var(--panel));
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 24px 20px 20px;
  margin-bottom: 16px;
}
.globe-watermark {
  position: absolute;
  top: 50%;
  right: -25px;
  transform: translateY(-50%);
  width: 170px;
  height: 170px;
  color: var(--gold);
  opacity: 0.07;
  pointer-events: none;
}
.rank-badge {
  position: absolute;
  top: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.rank-badge .icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.rank-badge .lbl {
  font-family: var(--font-mono);
  font-size: 8.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.tier-bronze .icon { background: linear-gradient(135deg,#8a6a3c,#c08a4e); color:#2a1c0a; }
.tier-bronze .lbl { color:#c08a4e; }
.tier-silver .icon { background: linear-gradient(135deg,#7c87a0,#d7deec); color:#1c2436; }
.tier-silver .lbl { color:#c7cdd9; }
.tier-gold .icon { background: linear-gradient(135deg,#c9932f,#f2d27a); color:#2a1c0a; }
.tier-gold .lbl { color: var(--gold); }
.tier-elite .icon { background: linear-gradient(135deg,#e0932a,#ffd873); color:#2a1c0a; box-shadow:0 0 10px rgba(255,200,80,0.45); }
.tier-elite .lbl { color:#ffcf6b; }
.tier-legendary .icon { background: linear-gradient(135deg,#f2c14e,#fff3c4); color:#2a1c0a; animation: legendaryPulse 1.8s ease-in-out infinite; }
.tier-legendary .lbl { color:#fff3c4; }
@keyframes legendaryPulse {
  0%,100% { box-shadow: 0 0 10px rgba(255,220,120,0.5); }
  50% { box-shadow: 0 0 22px rgba(255,220,120,0.95); }
}

.hero-top {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 6px;
  margin-bottom: 18px;
  position: relative;
}
.hero-count {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 88px;
  line-height: 0.85;
  color: var(--gold);
  text-shadow: 0 0 24px rgba(232,185,74,0.25);
}
.hero-total {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 32px;
  color: var(--text-muted);
}
.hero-label {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 22px;
}

.track-wrap { padding: 0 6px; position: relative; }
.track {
  position: relative;
  height: 6px;
  background: var(--line);
  border-radius: 3px;
  margin-bottom: 8px;
}
.track-fill {
  position: absolute;
  top: 0; left: 0; height: 100%;
  background: linear-gradient(90deg, var(--flag-blue), var(--gold));
  border-radius: 3px;
}
.track-ball {
  position: absolute;
  top: 50%;
  width: 18px; height: 18px;
  transform: translate(-50%, -50%);
  filter: drop-shadow(0 0 6px rgba(232,185,74,0.6));
  font-size: 16px;
  line-height: 18px;
  text-align: center;
}
.track-ticks {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-muted);
}
.track-ticks span.reached { color: var(--gold); }

.ticker-bar {
  display: flex;
  align-items: center;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 9px;
  overflow: hidden;
  margin-bottom: 16px;
}
.ticker-tag {
  flex-shrink: 0;
  background: var(--flag-red);
  color: #fff;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px 10px;
  align-self: stretch;
  display: flex;
  align-items: center;
}
.ticker-track-wrap {
  flex: 1;
  overflow: hidden;
  white-space: nowrap;
  padding: 8px 0;
}
.ticker-track {
  display: inline-block;
  white-space: nowrap;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.02em;
  color: var(--gold);
  animation: marquee linear infinite;
  padding-left: 1.5em;
}
@keyframes marquee {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
@media (prefers-reduced-motion: reduce) {
  .ticker-track { animation: none; }
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 10px;
}
.stat-chip {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 12px 8px;
  text-align: center;
}
.stat-chip .val {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 26px;
  color: var(--text);
  line-height: 1;
}
.stat-chip .lbl {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-top: 4px;
}

.form-strip {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 16px;
}
.form-lbl {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  text-transform: uppercase;
  flex-shrink: 0;
}
.form-pips { display: flex; gap: 6px; flex-wrap: wrap; }
.pip {
  width: 22px; height: 22px;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 11px;
}
.pip.W { background: rgba(74,222,128,0.18); color: var(--win); }
.pip.D { background: rgba(130,145,184,0.18); color: var(--draw); }
.pip.L { background: rgba(255,107,107,0.18); color: var(--loss); }
.form-empty { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); font-style: italic; }

.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 16px;
}
.card h2 {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin: 0 0 12px;
}

.path-summary {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-wrap: wrap;
  margin: -4px 0 14px;
  font-family: var(--font-mono);
  font-size: 12.5px;
}
.path-summary .big { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--gold); }
.path-summary .sep { color: var(--line); }
.path-summary .tag { color: var(--win); }

.path-list { max-height: 260px; overflow-y: auto; }
.path-item, .log-item {
  position: relative;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 4px;
  border-bottom: 1px dashed var(--line);

  font-size: 12px;
}
.path-item:last-child, .log-item:last-child { border-bottom: none; }
.path-item:not(:last-child)::before, .path-item:not(:last-child)::after,
.log-item:not(:last-child)::before, .log-item:not(:last-child)::after {

  border: 1px solid var(--line);

}
.path-item:not(:last-child)::before, .log-item:not(:last-child)::before { left: -3px; }
.path-item:not(:last-child)::after, .log-item:not(:last-child)::after { right: -3px; }
.path-num { color: var(--text-muted); width: 20px; flex-shrink: 0; }
.path-score { color: var(--text); width: 40px; flex-shrink: 0; font-weight: 700; }
.path-opp { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--font-body); font-size: 13px; }
.path-ovr { color: var(--text-muted); flex-shrink: 0; }

.badge {
  width: 26px; height: 26px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  font-size: 12px;
  flex-shrink: 0;
}
.badge.W { background: rgba(74,222,128,0.15); color: var(--win); }
.badge.D { background: rgba(130,145,184,0.15); color: var(--draw); }
.badge.L { background: rgba(255,107,107,0.15); color: var(--loss); }
.log-note {
  flex: 1;
  min-width: 0;

  gap: 2px;
}
.log-note-top { display: flex; align-items: baseline; gap: 6px; overflow: hidden; }
.log-opp {
  color: var(--text);
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 13px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.log-ovr {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  background: var(--panel-2);

  border-radius: 4px;

  white-space: nowrap;

}
.log-note-bottom {

.log-score { color: var(--gold); font-weight: 700; white-space: nowrap; }
.log-formation { color: var(--flag-blue); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.refresh-bar {

.refresh-btn {

  .stats-row { grid-template-columns: repeat(2, 1fr); }

</style>

<body>
<div class="shell">
  <div class="eyebrow-row">
    <div class="eyebrow">DIVISION RIVALS &middot; HEAD TO HEAD</div>
    <div class="spectator-tag">Spectator view</div>
  </div>
  <h1>FC <span>CHAMPION</span></h1>
  <p class="subtitle">Live stat sheet &mdash; read only.</p>

  <div id="app">
    <div class="loading">Loading shared stats&hellip;</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAy4Oj_xCnrRibyYz5Gi7ipZVUgOcWRLU4",
  authDomain: "h2h-fc-champ-richmission.firebaseapp.com",
  databaseURL: "https://h2h-fc-champ-richmission-default-rtdb.firebaseio.com",
  projectId: "h2h-fc-champ-richmission",
  storageBucket: "h2h-fc-champ-richmission.firebasestorage.app",
  messagingSenderId: "687003547271",
  appId: "1:687003547271:web:774768d54b354fad7d2a22"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const matchesRef = db.ref('matches');
const metaRef = db.ref('meta/myOvr');

<script>
let allMatches = [];
let connected = false;
let lastUpdate = null;
let myOvr = 122;
let prevStars = null;
let pulseUpdate = false;

function tierFor(stars) {
  if (stars >= 40) return { name: 'Legendary', cls: 'tier-legendary' };
  if (stars >= 30) return { name: 'Elite', cls: 'tier-elite' };
  if (stars >= 20) return { name: 'Gold', cls: 'tier-gold' };
  if (stars >= 10) return { name: 'Silver', cls: 'tier-silver' };
  return { name: 'Bronze', cls: 'tier-bronze' };
}

function goalTotals(list) {
  let gf = 0, ga = 0;
  list.forEach(m => {
    if (m.score && /^\d+\s*-\s*\d+$/.test(m.score.trim())) {
      const parts = m.score.trim().split('-').map(s => parseInt(s.trim(), 10));
      gf += parts[0]; ga += parts[1];
    }
  });
  return { gf, ga };
}

function computeRecords(champMatches) {
  let bestWin = null, bestWinMargin = -1;
  let toughest = null, toughestOvr = -1;
  let curStreak = 0, maxStreak = 0;

  champMatches.forEach(m => {
    if (m.result === 'W' && m.score && /^\d+\s*-\s*\d+$/.test(m.score.trim())) {
      const parts = m.score.trim().split('-').map(s => parseInt(s.trim(), 10));
      const margin = parts[0] - parts[1];
      if (margin > bestWinMargin) { bestWinMargin = margin; bestWin = m; }
    }
    if (m.oppOvr && m.oppOvr > toughestOvr) { toughestOvr = m.oppOvr; toughest = m; }
    if (m.result === 'W') { curStreak++; if (curStreak > maxStreak) maxStreak = curStreak; }
    else { curStreak = 0; }
  });

  const notedMatches = champMatches.filter(m => m.note && m.note.trim());

  return { bestWin, toughest, maxStreak, notedMatches };
}

function statsFor(list) {
  const wins = list.filter(m => m.result === 'W').length;
  const draws = list.filter(m => m.result === 'D').length;
  const losses = list.filter(m => m.result === 'L').length;
  const played = list.length;
  const winRate = played ? Math.round((wins / played) * 100) : null;
  let streak = 0, streakType = null;
  for (let i = list.length - 1; i >= 0; i--) {
    if (streakType === null) { streakType = list[i].result; streak = 1; }
    else if (list[i].result === streakType) { streak++; }
    else break;
  }
  return { wins, draws, losses, played, winRate, streak, streakType };
}

function fmtTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  if (sameDay) return time;
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + time;
}

function fmtAgo(ts) {
  if (!ts) return 'never';
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function latestResultHeadline(m) {
  const opp = m.opponent || 'the opposition';
  const scoreTag = m.score ? `, ${m.score}` : '';
  let margin = null;
  if (m.score && /^\d+\s*-\s*\d+$/.test(m.score.trim())) {
    const [a, b] = m.score.trim().split('-').map(s => parseInt(s.trim(), 10));
    margin = Math.abs(a - b);
  }
  if (m.result === 'W') {
    if (margin !== null && margin >= 4) return pick([`SENSATIONAL! ${opp} put to the sword${scoreTag}.`, `ROUT! A statement performance against ${opp}${scoreTag}.`]);
    if (margin !== null && margin >= 2) return pick([`Statement win over ${opp}${scoreTag}.`, `Comfortable does it — beats ${opp}${scoreTag}.`]);
    return pick([`Backs-to-the-wall stuff — edges past ${opp}${scoreTag}.`, `Narrow margins, same result — sees off ${opp}${scoreTag}.`]);
  }
  if (m.result === 'D') return pick([`Stalemate with ${opp} — spoils shared${scoreTag}.`, `Honours even against ${opp}${scoreTag}.`]);
  return pick([`Setback vs ${opp} — response needed${scoreTag}.`, `${opp} leaves with the points${scoreTag}.`]);
}

function buildHeadlines(champMatches, champStats, preStats, stars, champGoals, myOvr) {
  const heads = [];
  const toGo = Math.max(0, 50 - stars);
  if (champMatches.length === 0) {
    heads.push(pick(['Kickoff pending — first ball drops soon.', 'The stage is set. Fifty stars await.']));
  } else {
    heads.push(latestResultHeadline(champMatches[champMatches.length - 1]));
    if (champStats.streak >= 3 && champStats.streakType === 'W') heads.push(`${champStats.streak}-match winning run in full flow.`);
    else if (champStats.streak === 2 && champStats.streakType === 'W') heads.push('Two on the spin — momentum building.');
    else if (champStats.streak >= 2 && champStats.streakType === 'L') heads.push(`Wobble continues — ${champStats.streak} without a win.`);
    heads.push(toGo === 0 ? 'Fifty stars reached. History made.' : `${toGo} stars from history. The push continues.`);
    if (champMatches.length >= 3) heads.push(`${champGoals.gf} scored, ${champGoals.ga} conceded in the Champion push.`);

    const bestPunch = champMatches
      .filter(m => m.result === 'W' && m.oppOvr && myOvr && m.oppOvr > myOvr)
      .sort((a, b) => b.oppOvr - a.oppOvr)[0];
    if (bestPunch) heads.push(`Punching above weight — beat a ${bestPunch.oppOvr} OVR side at ${myOvr} OVR.`);

    if (champStats.played >= 3 && preStats.played > 0 && champStats.winRate !== null && preStats.winRate !== null) {
      heads.push(champStats.winRate >= preStats.winRate
        ? `Matching the pace of the climb — ${champStats.winRate}% in Champion vs ${preStats.winRate}% getting here.`
        : `Tougher going in Champion — win rate down to ${champStats.winRate}% from ${preStats.winRate}% on the way up.`);
    }

    heads.push(`FC Champion record now reads ${champStats.wins}-${champStats.draws}-${champStats.losses}.`);
  }
  heads.push(preStats.losses === 0 && preStats.played > 0
    ? `Unbeaten in the climb: ${preStats.wins}-${preStats.draws}-${preStats.losses} and counting.`
    : `Path to Champion closed the book at ${preStats.wins}-${preStats.draws}-${preStats.losses}.`);
  return heads;
}

function showMilestoneToast(text) {
  const toast = document.createElement('div');
  toast.className = 'milestone-toast';
  toast.textContent = text;
  document.body.appendChild(toast);
  requestAnimationFrame(() => { toast.classList.add('show'); });
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 500);
  }, 3000);
}

function computeChampStars(list) {
  const champMatches = list.filter(m => m.phase === 'champ');
  return Math.max(0, champMatches.reduce((s, m) => s + (m.delta || 0), 0));
}

function checkMilestone(newMatches) {
  const newStars = computeChampStars(newMatches);
  if (prevStars !== null && newStars !== prevStars) {
    pulseUpdate = true;
    setTimeout(() => { pulseUpdate = false; render(); }, 1200);
    const prevBracket = Math.floor(Math.min(prevStars, 50) / 10);
    const newBracket = Math.floor(Math.min(newStars, 50) / 10);
    if (newBracket > prevBracket && newStars > prevStars) {
      showMilestoneToast(`${newBracket * 10} STARS REACHED`);
    }
  }
  prevStars = newStars;
}

function initMeta() {
  metaRef.on('value', (snap) => {
    const v = snap.val();
    myOvr = (typeof v === 'number') ? v : 122;
    render();
  });
}

function initSync() {
  matchesRef.on('value', (snapshot) => {
    connected = true;
    lastUpdate = new Date().toISOString();
    const val = snapshot.val();
    allMatches = val === null ? [] : (Array.isArray(val) ? val.filter(Boolean) : Object.values(val));
    checkMilestone(allMatches);
    render();
  }, (error) => {
    console.error('Firebase read failed', error);
    connected = false;
    render();
  });
}

function render() {
  const app = document.getElementById('app');

  if (!connected && allMatches.length === 0) {
    app.innerHTML = `<div class="empty-state">Connecting&hellip; if this doesn't clear, the database may not be reachable right now.</div>`;
    return;
  }

  if (allMatches.length === 0) {
    app.innerHTML = `<div class="empty-state">No shared stats yet. Ask them to open their tracker so it syncs here.</div>`;
    return;
  }

  const matches = allMatches;
  const champMatches = matches.filter(m => m.phase === 'champ');
  const preMatches = matches.filter(m => m.phase === 'pre');
  const champStats = statsFor(champMatches);
  const preStats = statsFor(preMatches);
  const preGoals = goalTotals(preMatches);
  const champGoals = goalTotals(champMatches);

  const champTotal = champMatches.reduce((sum, m) => sum + (m.delta || 0), 0);
  const stars = Math.max(0, champTotal);
  const pct = Math.min(100, (stars / 50) * 100);
  const toGo = Math.max(0, 50 - stars);
  const streakLabel = champStats.streak > 0 ? `${champStats.streak}${champStats.streakType}` : '—';
  const winRateLabel = champStats.winRate === null ? '—' : `${champStats.winRate}%`;
  const tier = tierFor(stars);

  const headlines = buildHeadlines(champMatches, champStats, preStats, stars, champGoals, myOvr);
  const trackText = headlines.join('   •   ');
  const tickerDuration = Math.max(18, Math.min(50, Math.round(trackText.length / 6)));
  const records = computeRecords(champMatches);

  const tickValues = [0, 10, 20, 30, 40, 50];
  const ticksHtml = tickValues.map(v => `<span class="${stars >= v ? 'reached' : ''}">${v}</span>`).join('');

  const last5 = champMatches.slice(-5);
  const formHtml = last5.length
    ? last5.map(m => `<span class="pip ${m.result}">${m.result}</span>`).join('')
    : '<span class="form-empty">No matches yet</span>';

  const champLogHtml = champMatches.length === 0
    ? `<div class="empty-state">No FC Champion matches logged yet.</div>`
    : champMatches.slice().reverse().map(m => {
        const d = m.delta || 0;
        const dClass = d > 0 ? 'pos' : d < 0 ? 'neg' : 'zero';
        const dLabel = (d > 0 ? '+' : '') + d;

        const topHtml = m.opponent
          ? `<span class="log-opp">${escapeHtml(m.opponent)}</span>${m.oppOvr ? `<span class="log-ovr">${m.oppOvr} OVR</span>` : ''}`
          : '';
        const bottomParts = [];
        if (m.score) bottomParts.push(`<span class="log-score">${escapeHtml(m.score)}</span>`);
        if (m.formation) bottomParts.push(`<span class="log-formation">${escapeHtml(m.formation)}</span>`);
        const bottomHtml = bottomParts.length ? `<div class="log-note-bottom">${bottomParts.join('')}</div>` : '';
        const structuredHtml = `${topHtml ? `<div class="log-note-top">${topHtml}</div>` : ''}${bottomHtml}`;
        const isEmpty = !topHtml && !bottomHtml;
        const noteHtml = isEmpty ? `<span class="log-note-plain">${escapeHtml(m.note || 'No note')}</span>` : structuredHtml;

        return `
        <div class="log-item">
          <div class="badge ${m.result}">${m.result}</div>
          <div class="log-note ${isEmpty ? 'empty' : ''}">${noteHtml}</div>
          <div class="log-delta ${dClass}">${dLabel}</div>
        </div>`;
      }).join('');

  const pathListHtml = preMatches.map((m, i) => `
    <div class="path-item">
      <div class="path-num">${i + 1}.</div>
      <div class="badge ${m.result}" style="width:20px;height:20px;font-size:10px;">${m.result}</div>
      <div class="path-score">${m.score || '—'}</div>
      <div class="path-opp">${escapeHtml((m.opponent || 'Unknown') + (m.formation ? ' · ' + m.formation : ''))}</div>
      <div class="path-ovr">${m.oppOvr ? m.oppOvr + ' OVR' : ''}</div>
    </div>`).join('');

  const gd = preGoals.gf - preGoals.ga;
  const unbeatenTag = preStats.losses === 0 && preStats.played > 0 ? '<span class="tag">Unbeaten</span>' : '';

  app.innerHTML = `
    <div class="nameplate">
      <span class="dot"></span>
      <span class="lbl">Manager</span>
      <span class="name">rich-mission</span>
    </div>
    <div class="ovr-chip">
      <span class="lbl">My OVR</span>
      <span class="ovr-value">${myOvr}</span>
    </div>

    <div class="hero">
      <svg class="globe-watermark" viewBox="0 0 200 200" aria-hidden="true">
        <circle cx="100" cy="100" r="90" stroke="currentColor" stroke-width="1" fill="none"/>
        <ellipse cx="100" cy="100" rx="90" ry="34" stroke="currentColor" stroke-width="1" fill="none"/>
        <ellipse cx="100" cy="100" rx="44" ry="90" stroke="currentColor" stroke-width="1" fill="none"/>
        <line x1="10" y1="100" x2="190" y2="100" stroke="currentColor" stroke-width="1"/>
      </svg>
      <div class="rank-badge ${tier.cls}">
        <div class="icon">&#9733;</div>
        <div class="lbl">${tier.name}</div>
      </div>
      <div class="hero-top">
        <div class="hero-count ${pulseUpdate ? 'pulse-update' : ''}">${stars}</div>
        <div class="hero-total">/ 50</div>
      </div>
      <div class="hero-label">${toGo === 0 && champMatches.length ? 'Goal reached' : toGo + ' stars to go'}</div>
      <div class="track-wrap">
        <div class="track">
          <div class="track-fill" style="width:${pct}%"></div>
          <div class="track-ball" style="left:${pct}%">&#9917;</div>
        </div>
        <div class="track-ticks">${ticksHtml}</div>
      </div>
    </div>

    <div class="ticker-bar">
      <div class="ticker-tag">Live</div>
      <div class="ticker-track-wrap">
        <div class="ticker-track" style="animation-duration:${tickerDuration}s">${escapeHtml(trackText)}   •   ${escapeHtml(trackText)}</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-chip"><div class="val">${champStats.wins}-${champStats.draws}-${champStats.losses}</div><div class="lbl">Record</div></div>
      <div class="stat-chip"><div class="val">${winRateLabel}</div><div class="lbl">Win rate</div></div>
      <div class="stat-chip"><div class="val">${streakLabel}</div><div class="lbl">Streak</div></div>
      <div class="stat-chip"><div class="val">${champStats.played}</div><div class="lbl">Played</div></div>
    </div>

    <div class="form-strip">
      <span class="form-lbl">Form</span>
      <div class="form-pips">${formHtml}</div>
    </div>

    <div class="card">
      <h2>FC Champion log</h2>
      ${champLogHtml}
    </div>

    <div class="card">
      <h2>Records</h2>
      <div class="records-grid">
        <div class="record-tile">
          <div class="record-lbl">Best Win</div>
          <div class="record-val">${records.bestWin ? escapeHtml(records.bestWin.score) : '—'}</div>
          <div class="record-sub">${records.bestWin ? escapeHtml(records.bestWin.opponent || 'Unknown') : 'No wins yet'}</div>
        </div>
        <div class="record-tile">
          <div class="record-lbl">Toughest Test</div>
          <div class="record-val">${records.toughest ? records.toughest.oppOvr + ' OVR' : '—'}</div>
          <div class="record-sub">${records.toughest ? escapeHtml(records.toughest.opponent || 'Unknown') : 'No data yet'}</div>
        </div>
        <div class="record-tile">
          <div class="record-lbl">Best Streak</div>
          <div class="record-val">${records.maxStreak > 0 ? records.maxStreak + 'W' : '—'}</div>
          <div class="record-sub">${records.maxStreak > 0 ? 'in a row' : 'No streak yet'}</div>
        </div>
      </div>
      ${records.notedMatches.length ? `
      <div class="notes-section">
        <div class="notes-lbl">Manager&rsquo;s Notes</div>
        ${records.notedMatches.slice().reverse().map(m => `
          <div class="note-entry">
            <span class="note-text">&ldquo;${escapeHtml(m.note)}&rdquo;</span>
            <span class="note-context">${escapeHtml([m.opponent, m.score].filter(Boolean).join(' · ') || m.result)}</span>
          </div>
        `).join('')}
      </div>` : ''}
    </div>

    <div class="card">
      <h2>Path to Champion</h2>
      <div class="path-summary">
        <span class="big">${preStats.wins}-${preStats.draws}-${preStats.losses}</span>
        <span class="sep">&middot;</span>
        <span>${preGoals.gf}-${preGoals.ga} goals (${gd >= 0 ? '+' : ''}${gd})</span>
        <span class="sep">&middot;</span>
        ${unbeatenTag}
      </div>
      <div class="path-list">${pathListHtml}</div>
    </div>

    <div class="updated-note">${connected ? '&#9679; Live &mdash; updates instantly' : 'Reconnecting&hellip;'}</div>
  `;
}

initSync();
initMeta();
setTimeout(() => {
  if (!connected && allMatches.length === 0) {
    document.getElementById('app').innerHTML = '<div class="empty-state">Still trying to reach the database after several seconds. This usually means an ad-blocker or privacy extension is blocking firebaseio.com, or the network is blocking it. Try a different browser or network, or check the browser console for errors.</div>';
  }
}, 8000);
</script>
</body>
</html>
